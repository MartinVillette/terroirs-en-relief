<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Production de Vins 2024</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6"></script>
    <style>
        * {
            box-sizing: border-box;
            margin:0;
            padding:0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            /* background-color: #4A0E17; */
            background-color: #5c131e;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #FDFBF7;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top:100px;
        }

        h1 {
            color: #5c131e;
            margin-bottom: 20px;
        }

        /* Tab navigation */
        .tab-nav {
            display: flex;
            gap: 6px;
            margin-bottom: 24px;
            padding-bottom: 0;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 18px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 500;
            color: #777;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            border-radius: 4px 4px 0 0;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }
        .tab-btn:hover {
            color: #333;
            background: #f8f2f2;
        }
        .tab-btn.active {
            color: #5c131e;
            border-bottom: 3px solid #5c131e;
            background: #fff1f0;
        }

        /* Tab panels */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .controls {
            margin-bottom: 20px;
        }
        label {
            margin-right: 10px;
            font-weight: 500;
        }
        select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        .dashboard-section {
            margin-top: 20px;
            margin-bottom: 40px;
        }
        .loading {
            color: gray;
            padding: 20px;
            text-align: center;
        }
        figcaption {
            margin-top:20px;
            font-style: italic;
            font-size: 11px;
            color: rgb(153, 153, 153);
        }
        .dashboard-section {
            display: flex;
            justify-content: center;
        }
        header{
            position: fixed;
            width: 100%;
            top:0;
            left: 0;
        }
        .nav-links {
            display: flex;
            width:100%;
            background-color: #4A0E17;
            padding:20px 50px;
            gap:40px;
        }
        .nav-links a {
            margin-right: 15px;
            color: #C5A059;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s ease;
            padding:10px 10px;
            border-radius:5px 5px 0 0;
            background-color: rgba(197, 160, 89, 0);
        }
        .nav-links a:hover { 
            color: #FDFBF7;
            background-color: rgba(197, 160, 89, 0.2);
            border-bottom: 2px solid #C5A059;
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="methodology.html">Méthodologie</a>
            <a href="exploration.html">Explorer les données</a>
        </div>
    </header>

    <div class="container">
        <h1>
            Dashboard Vins & Géographie - France 2024
            <select id="wineTypeGlobal" style="margin-left:20px;padding:6px 12px;border:1px solid #ddd;border-radius:4px;font-size:14px;cursor:pointer;vertical-align:middle;">
                <option value="total_aop">Production Totale AOP</option>
                <option value="aop_rouge">Vin Rouge AOP</option>
                <option value="aop_blanc">Vin Blanc AOP</option>
                <option value="aop_rose">Vin Rosé AOP</option>
            </select>
        </h1>

        <!-- Tab navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="production">Production</button>
            <button class="tab-btn" data-tab="caracteristiques">Caractéristiques</button>
            <button class="tab-btn" data-tab="impact">Impact</button>
        </div>

        <!-- Production -->
        <div class="tab-panel active" id="tab-production">
            <div class="controls">
                <label for="prodType">Afficher :</label>
                <select id="prodType">
                    <option value="production">Volume de production</option>
                    <option value="rendement">Rendement</option>
                </select>
            </div>
            <div id="production-dashboard" class="dashboard-section">
                <div class="loading">Chargement des données de production...</div>
            </div>
        </div>

        <!-- Caractéristiques -->
        <div class="tab-panel" id="tab-caracteristiques">
            <div class="controls">
                <label for="caracType">Caractéristique :</label>
                <select id="caracType">
                    <option value="ensoleillement">Ensoleillement</option>
                    <option value="pente">Pente</option>
                    <option value="orientation">Orientation</option>
                    <option value="altitude">Altitude</option>
                </select>
            </div>
            <div id="caracteristiques-dashboard" class="dashboard-section">
                <div class="loading">Chargement des données...</div>
            </div>
        </div>

        <!-- Impact -->
        <div class="tab-panel" id="tab-impact">
            <div class="controls">
                <label for="impactFactor">Facteur d'analyse :</label>
                <select id="impactFactor">
                    <option value="soleil">Ensoleillement</option>
                    <option value="altitude">Altitude</option>
                    <option value="pente">Pente</option>
                    <option value="exposition">Exposition</option>
                </select>
            </div>
            <div id="impact-dashboard" class="dashboard-section">
                <div class="loading">Chargement de l'analyse d'impact...</div>
            </div>
        </div>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
